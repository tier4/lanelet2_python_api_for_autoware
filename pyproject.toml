[project]
name = "lanelet2-python-api"
version = "0.1.0"
description = "Standalone Autoware Lanelet2 Extension Python API"
readme = "readme.md"
requires-python = ">=3.9"
dependencies = [
    "numpy>=2.0.2",
]

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = [
    "lanelet2_python_api",
    "lanelet2",
    "autoware_lanelet2_extension_python",
    "autoware_lanelet2_extension_python.impl",
    "autoware_lanelet2_extension_python.projection", 
    "autoware_lanelet2_extension_python.regulatory_elements",
    "autoware_lanelet2_extension_python.utility"
]
package-dir = {"lanelet2" = "install/lib/python3/dist-packages/lanelet2", "autoware_lanelet2_extension_python" = "install/lib/python3/dist-packages/autoware_lanelet2_extension_python"}
include-package-data = true

[tool.setuptools.package-data]
"lanelet2_python_api" = ["*.py"]
"lanelet2" = ["*.so", "*.py"]
"autoware_lanelet2_extension_python" = ["*.so", "*.py"]
"autoware_lanelet2_extension_python.impl" = ["*.py"]
"autoware_lanelet2_extension_python.projection" = ["*.py"]
"autoware_lanelet2_extension_python.regulatory_elements" = ["*.py"]
"autoware_lanelet2_extension_python.utility" = ["*.py"]
"*" = ["install/**/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=7.0",
]

[tool.uv.sources]
# Auto-build on install
lanelet2-python-api = { path = ".", editable = true }

[project.scripts]
lanelet2-build = "lanelet2_python_api.build:main"
lanelet2-install = "lanelet2_python_api.installer:main"
