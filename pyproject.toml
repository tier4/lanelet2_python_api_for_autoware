[build-system]
requires = [
    "setuptools",
    "wheel", 
    "scikit-build",
    "cmake",
    "ninja",
    "pybind11",
]
build-backend = "setuptools.build_meta"

[project]
name = "lanelet2-python-api"
version = "0.1.0"
description = "Python bindings for Lanelet2 with Autoware extension"
authors = [
    {name = "Masaya Kataoka", email = "ms.kataoka@gmail.com"}
]
readme = "readme.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.21.0",
]
